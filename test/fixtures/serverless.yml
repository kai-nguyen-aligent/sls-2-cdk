service: my-service
provider:
  name: aws
  runtime: nodejs20.x
  stage: ${opt:stage, 'dev'}
  environment:
    DB_HOST: ${ssm:/myapp/${sls:stage}/db-host}
    DB_PASSWORD: ${ssm:/myapp/${sls:stage}/db-password~true}
    API_KEY: ${ssm(us-west-2):/shared/api-key}
    RAW_PARAM: ${ssm(raw):/myapp/raw-config}

functions:
  hello:
    handler: handler.hello
    environment:
      FUNCTION_SECRET: ${ssm:/myapp/${sls:stage}/hello-secret~true}
  world:
    handler: handler.world

resources:
  Resources:
    MyDynamoDBTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:service}-${sls:stage}-items
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
        KeySchema:
          - AttributeName: id
            KeyType: HASH
        BillingMode: PAY_PER_REQUEST

    MyS3Bucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: ${self:service}-${sls:stage}-uploads

stepFunctions:
  stateMachines:
    myStateMachine:
      name: ${self:service}-${sls:stage}-workflow
      definition:
        StartAt: HelloStep
        States:
          HelloStep:
            Type: Task
            Resource:
              Fn::GetAtt: [hello, Arn]
            Next: PassStep
          PassStep:
            Type: Pass
            Result: "passed"
            Next: WorldStep
          WorldStep:
            Type: Task
            Resource:
              Fn::GetAtt: [world, Arn]
            End: true
